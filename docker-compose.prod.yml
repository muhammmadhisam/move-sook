# MoveSook — production stack (pre-built images).
#
#   cp .env.prod .env          # fill in all secrets
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Images are built via build/docker-compose.yml and pushed to the registry.
# NEXT_PUBLIC_* vars are baked into the Next.js bundles at build time —
# they must NOT be set here; pass them as --build-arg when building images.
#
# Ports: api 8787 · admin 3001 · postgres 5432 (internal only by default)

name: movesook-prod

services:

  # ── One-shot migration runner (exits 0 on success) ─────────────────────────
  migrate:
    image: devpala/move-sook-migrate:${IMAGE_TAG:-latest}
    working_dir: /repo/packages/db
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: no

  # ── Hono API (Bun) ──────────────────────────────────────────────────────────
  api:
    image: devpala/move-sook-api:${IMAGE_TAG:-latest}
    container_name: movesook-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8787}:8787"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8787/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Admin (Next.js standalone) ──────────────────────────────────────────────
  admin:
    image: devpala/move-sook-admin:${IMAGE_TAG:-latest}
    container_name: movesook-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: movesook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-movesook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-movesook}
    volumes:
      - movesook_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-movesook} -d ${POSTGRES_DB:-movesook}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Not published externally by default — connect via Docker network.
    # Uncomment to expose for admin tools (e.g. TablePlus):
    # ports:
    #   - "5432:5432"

volumes:
  movesook_pgdata:
    name: movesook_pgdata
