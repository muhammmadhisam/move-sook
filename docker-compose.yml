services:
  postgres:
    image: postgres:16-alpine
    container_name: movesook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: movesook
      POSTGRES_PASSWORD: movesook
      POSTGRES_DB: movesook
    ports:
      - "5432:5432"
    volumes:
      - movesook_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movesook -d movesook"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: movesook-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - movesook_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    image: devpala/movesook-api:latest
    container_name: movesook-admin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8888:8787"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", ""]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  movesook_pgdata:
  movesook_redisdata:
